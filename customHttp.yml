customHeaders:
  - pattern: '**/*'
    headers:
      # Impede que o site seja carregado dentro de iframes (clickjacking)
      - key: X-Frame-Options
        value: DENY
      # Impede que o browser adivinhe o tipo MIME (MIME sniffing)
      - key: X-Content-Type-Options
        value: nosniff
      # Força HTTPS por 2 anos, inclui subdomínios
      - key: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains; preload
      # Controla informações enviadas no header Referer
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
      # Desativa funcionalidades sensíveis do browser que não são usadas
      - key: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=()
      # Content Security Policy — restringe origens de conteúdo
      # Ajuste *.supabase.co para o domínio exato após confirmar o project URL
      - key: Content-Security-Policy
        value: >-
          default-src 'self';
          script-src 'self' 'wasm-unsafe-eval';
          style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
          font-src 'self' https://fonts.gstatic.com;
          img-src 'self' data: blob: https:;
          connect-src 'self' https://*.supabase.co wss://*.supabase.co https://viacep.com.br https://brasilapi.com.br;
          frame-src 'self' blob:;
          object-src 'none';
          frame-ancestors 'none';
          base-uri 'self';
          form-action 'self';
          upgrade-insecure-requests
      # Evita HTML/manifest antigo apontando para assets com hash que já não existem
      # após um novo deploy. Sem isso, o browser pode tentar baixar CSS/JS 404.
      - key: Cache-Control
        value: no-cache, no-store, must-revalidate
